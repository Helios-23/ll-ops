- name: Configure AI server baseline and AI stack
  hosts: gex1
  remote_user: devops
  become: true
  gather_facts: true
  vars:
    ansible_become_password: "{{ vault_all.ansible_become_password }}"

  roles:
    - role: ubuntu_pro_fips
    - role: nginx
    - role: certbot_tls
    - role: ai_rig
