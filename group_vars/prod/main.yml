# Ubuntu Pro
ubuntu_pro_enable: true
ubuntu_pro_token: "{{ vault_all.ubuntu_pro.repo_token }}"
ubuntu_pro_fips_service: "fips-updates"
ubuntu_pro_usg_enable: true
ubuntu_pro_usg_profile: "cis_level1_server"
ubuntu_pro_usg_run_fix: true
ubuntu_pro_usg_run_audit: true
ubuntu_pro_preserve_access: true
ubuntu_pro_access_user: "devops"
ubuntu_pro_access_public_key_path: "{{ playbook_dir }}/keys/ssh/devops.llight.org.pub"
ubuntu_pro_access_public_key_paths:
  - "{{ playbook_dir }}/keys/ssh/devops.llight.org.fips_rsa.pub"
  - "{{ ubuntu_pro_access_public_key_path }}"
ubuntu_pro_access_password: "{{ vault_all.ansible_become_password }}"

# Forgejo
allowed_ssh_users:
  - "devops"
sshd_password_auth: "yes"
sshd_additional_protected_ports:
  - 2222
fail2ban_feature_forgejo_enabled: true
# Enable to ban sshd invalid-user probes for specific usernames after a single match.
fail2ban_feature_sshd_invalid_user_enabled: true
# Enable to have Fail2ban watch reverse-proxy access logs for repeated 401/403 responses.
fail2ban_feature_reverse_proxy_enabled: false
