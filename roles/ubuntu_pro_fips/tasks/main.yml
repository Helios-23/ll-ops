- name: Remove legacy sources.list with Hetzner mirrors
  copy:
    dest: /etc/apt/sources.list
    owner: root
    group: root
    mode: "0644"
    content: |
      # Sources replaced with official Ubuntu archives for FIPS compatibility
  when:
    - ubuntu_pro_enable | bool
    - ubuntu_pro_fips_use_official_mirror | default(true) | bool

- name: Switch to official Ubuntu archives (DEB822 format)
  copy:
    dest: /etc/apt/sources.list.d/ubuntu.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: http://archive.ubuntu.com/ubuntu/
      Suites: jammy jammy-updates jammy-backports
      Components: main restricted universe multiverse
      Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

      Types: deb
      URIs: http://security.ubuntu.com/ubuntu/
      Suites: jammy-security
      Components: main restricted universe multiverse
      Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
  when:
    - ubuntu_pro_enable | bool
    - ubuntu_pro_fips_use_official_mirror | default(true) | bool

- name: Ensure ubuntu-advantage-tools is installed
  apt:
    name: ubuntu-advantage-tools
    state: present
    update_cache: true
  when: ubuntu_pro_enable | bool

- name: Check Ubuntu Pro status
  command: pro status --format json
  register: ubuntu_pro_status
  changed_when: false
  when: ubuntu_pro_enable | bool

- name: Attach Ubuntu Pro subscription
  command: "pro attach {{ ubuntu_pro_token }}"
  register: ubuntu_pro_attach
  when:
    - ubuntu_pro_enable | bool
    - ubuntu_pro_token | length > 0
    - (ubuntu_pro_status.stdout | from_json).attached | default(false) | bool == false

- name: Refresh Ubuntu Pro status after attach
  command: pro status --format json
  register: ubuntu_pro_status_after_attach
  changed_when: false
  when: ubuntu_pro_enable | bool

- name: Enable FIPS service
  command: "pro enable {{ ubuntu_pro_fips_service }} --assume-yes"
  register: ubuntu_pro_enable_fips
  changed_when: >
    'already enabled' not in ((ubuntu_pro_enable_fips.stdout ~ ubuntu_pro_enable_fips.stderr) | lower)
  when:
    - ubuntu_pro_enable | bool
    - >
      ubuntu_pro_fips_service not in
      (((ubuntu_pro_status_after_attach.stdout | from_json).services | default([]))
      | selectattr('name', 'equalto', ubuntu_pro_fips_service)
      | selectattr('status', 'equalto', 'enabled')
      | list
      | map(attribute='name')
      | list)

- name: Reboot after FIPS enablement
  reboot:
    msg: "Reboot initiated by Ansible after Ubuntu Pro FIPS enablement"
    connect_timeout: 20
    reboot_timeout: 1800
    post_reboot_delay: 30
  when:
    - ubuntu_pro_enable | bool
    - ubuntu_pro_enable_fips is defined
    - ubuntu_pro_enable_fips is changed

- name: Preserve devops SSH and sudo access before USG hardening
  include_tasks: preserve_devops_access.yml
  when:
    - ubuntu_pro_enable | bool
    - ubuntu_pro_preserve_access | bool

- name: Refresh Ubuntu Pro status before USG setup
  command: pro status --format json
  register: ubuntu_pro_status_before_usg
  changed_when: false
  when:
    - ubuntu_pro_enable | bool
    - ubuntu_pro_usg_enable | bool

- name: Enable Ubuntu Security Guide service
  command: pro enable usg --assume-yes
  register: ubuntu_pro_enable_usg
  changed_when: >
    'already enabled' not in ((ubuntu_pro_enable_usg.stdout ~ ubuntu_pro_enable_usg.stderr) | lower)
  when:
    - ubuntu_pro_enable | bool
    - ubuntu_pro_usg_enable | bool
    - >
      'usg' not in
      (((ubuntu_pro_status_before_usg.stdout | from_json).services | default([]))
      | selectattr('name', 'equalto', 'usg')
      | selectattr('status', 'equalto', 'enabled')
      | list
      | map(attribute='name')
      | list)

- name: Install Ubuntu Security Guide
  apt:
    name: usg
    state: present
    update_cache: true
  when:
    - ubuntu_pro_enable | bool
    - ubuntu_pro_usg_enable | bool

- name: Ensure Ubuntu Pro role state directory exists
  file:
    path: "{{ ubuntu_pro_usg_state_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - ubuntu_pro_enable | bool
    - ubuntu_pro_usg_enable | bool

- name: Check whether CIS hardening has already been applied
  stat:
    path: "{{ ubuntu_pro_usg_state_dir }}/usg-{{ ubuntu_pro_usg_profile }}.applied"
  register: ubuntu_pro_usg_fix_marker
  when:
    - ubuntu_pro_enable | bool
    - ubuntu_pro_usg_enable | bool
    - ubuntu_pro_usg_run_fix | bool

- name: Apply CIS hardening with Ubuntu Security Guide
  command: "usg fix {{ ubuntu_pro_usg_profile }}"
  register: ubuntu_pro_usg_fix
  changed_when: true
  when:
    - ubuntu_pro_enable | bool
    - ubuntu_pro_usg_enable | bool
    - ubuntu_pro_usg_run_fix | bool
    - not ubuntu_pro_usg_fix_marker.stat.exists

- name: Reconnect after CIS hardening (SSH may have been reset)
  wait_for_connection:
    timeout: 60
  when:
    - ubuntu_pro_enable | bool
    - ubuntu_pro_usg_enable | bool
    - ubuntu_pro_usg_run_fix | bool
    - ubuntu_pro_usg_fix is changed

- name: Record CIS hardening marker
  copy:
    dest: "{{ ubuntu_pro_usg_state_dir }}/usg-{{ ubuntu_pro_usg_profile }}.applied"
    owner: root
    group: root
    mode: "0644"
    content: |
      profile={{ ubuntu_pro_usg_profile }}
      applied_by=ansible
  when:
    - ubuntu_pro_enable | bool
    - ubuntu_pro_usg_enable | bool
    - ubuntu_pro_usg_run_fix | bool
    - ubuntu_pro_usg_fix is defined
    - ubuntu_pro_usg_fix is changed

- name: Preserve devops SSH and sudo access after USG hardening
  include_tasks: preserve_devops_access.yml
  when:
    - ubuntu_pro_enable | bool
    - ubuntu_pro_preserve_access | bool

- name: Audit CIS compliance with Ubuntu Security Guide
  command: "usg audit {{ ubuntu_pro_usg_profile }}"
  register: ubuntu_pro_usg_audit
  changed_when: false
  failed_when: false
  when:
    - ubuntu_pro_enable | bool
    - ubuntu_pro_usg_enable | bool
    - ubuntu_pro_usg_run_audit | bool

- name: Reboot after CIS hardening
  reboot:
    msg: "Reboot initiated by Ansible after USG CIS hardening"
    connect_timeout: 20
    reboot_timeout: 1800
    post_reboot_delay: 30
  when:
    - ubuntu_pro_enable | bool
    - ubuntu_pro_usg_enable | bool
    - ubuntu_pro_usg_fix is defined
    - ubuntu_pro_usg_fix is changed
