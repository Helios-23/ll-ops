- name: Ensure devops primary group exists
  group:
    name: "{{ ubuntu_pro_access_group }}"
    state: present

- name: Ensure devops user exists with non-expiring password
  user:
    name: "{{ ubuntu_pro_access_user }}"
    group: "{{ ubuntu_pro_access_group }}"
    groups: sudo,docker
    append: true
    shell: /bin/bash
    password: "{{ ubuntu_pro_access_password | password_hash('sha512', ubuntu_pro_access_password_salt) }}"
    update_password: always
    expires: -1
    state: present
  no_log: true

- name: Ensure devops password aging is disabled
  command: "chage -M -1 -I -1 -E -1 {{ ubuntu_pro_access_user }}"
  changed_when: false

- name: Ensure devops SSH directory exists
  file:
    path: "/home/{{ ubuntu_pro_access_user }}/.ssh"
    state: directory
    owner: "{{ ubuntu_pro_access_user }}"
    group: "{{ ubuntu_pro_access_group }}"
    mode: "0700"

- name: Ensure devops SSH keys remain authorized
  ansible.posix.authorized_key:
    user: "{{ ubuntu_pro_access_user }}"
    key: "{{ lookup('file', item) }}"
    state: present
    manage_dir: false
  loop: "{{ ubuntu_pro_access_public_key_paths }}"

- name: Preserve SSH public key authentication
  copy:
    dest: /etc/ssh/sshd_config.d/99-devops-access.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      PubkeyAuthentication yes
      AuthorizedKeysFile .ssh/authorized_keys .ssh/authorized_keys2
      MaxAuthTries 6
      LoginGraceTime 120
      ClientAliveInterval 300
      ClientAliveCountMax 3
      PasswordAuthentication yes
      PermitRootLogin prohibit-password
      X11Forwarding yes
  register: ubuntu_pro_devops_sshd_config

- name: Validate SSH daemon configuration
  command: sshd -t
  changed_when: false

- name: Reload SSH daemon after devops access change
  service:
    name: ssh
    state: reloaded
  when: ubuntu_pro_devops_sshd_config is changed
