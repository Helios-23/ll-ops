- name: restart sshd
  systemd:
    name: ssh
    state: restarted

- name: restart fail2ban
  systemd:
    name: fail2ban
    state: restarted
    enabled: true

- name: reload fail2ban
  systemd:
    name: fail2ban
    state: restarted
    enabled: true

- name: restart knockd
  systemd:
    name: knockd
    state: restarted

- name: save iptables
  command: netfilter-persistent save
  changed_when: true
