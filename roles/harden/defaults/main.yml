# Hardening settings
fail2ban_admin_email: "helios23@gmail.com"
fail2ban_feature_forgejo_enabled: false
forgejo_fail2ban_logpath: "{{ (forgejo_data_dir | default('/opt/forgejo/data')) ~ '/gitea/log/gitea.log' }}"
forgejo_fail2ban_logdir: "{{ (forgejo_data_dir | default('/opt/forgejo/data')) ~ '/gitea/log' }}"
forgejo_fail2ban_uid: 1000
forgejo_fail2ban_gid: 1000
forgejo_fail2ban_maxretry: 10
forgejo_fail2ban_findtime: 3600
forgejo_fail2ban_bantime: 900
fail2ban_feature_reverse_proxy_enabled: false
reverse_proxy_fail2ban_logpath: "/var/log/nginx/access.log"
reverse_proxy_fail2ban_ports: "http,https"
reverse_proxy_fail2ban_statuses:
  - 401
  - 403
reverse_proxy_fail2ban_maxretry: 10
reverse_proxy_fail2ban_findtime: 600
reverse_proxy_fail2ban_bantime: 3600

# SSH hardening
sshd_port: 22
sshd_additional_protected_ports: []
sshd_permit_root_login: "no"
sshd_password_auth: "no"
sshd_challenge_response: "no"
harden_manage_pam_ssh_lockout: false
harden_manage_pam_allowed_users: false

# Port knocking (optional - set enable_knockd to true to enable)
enable_knockd: false
knock_ports: "7000,8000,9000"

# Honeypot (optional - set enable_honeypot to true to enable)
enable_honeypot: false

# Whitelisted IPs (bypass fail2ban and iptables rate limiting)
whitelisted_ips:
  - "100.96.33.6"
  - "100.72.123.112"
  - "100.119.26.114"
  - "100.106.28.43"
  - "178.156.230.199"
  - "60.47.215.84"

# Allowed SSH users (all other usernames will be rejected)
allowed_ssh_users:
  - "devops"
  - "j"
