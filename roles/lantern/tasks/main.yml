- name: Check if Lantern TLS certificate already exists
  stat:
    path: /etc/letsencrypt/live/{{ lantern_domain }}/fullchain.pem
  register: lantern_certbot_cert

- name: Obtain Lantern TLS certificate with certbot
  command: >
    certbot certonly --webroot
    --webroot-path /var/www/certbot
    --non-interactive
    --agree-tos
    --email {{ lantern_certbot_email }}
    -d {{ lantern_domain }}
    --keep-until-expiring
  when: not lantern_certbot_cert.stat.exists
  register: lantern_certbot_result
  changed_when: >
    'obtained' in (lantern_certbot_result.stdout | lower) or
    'new certificate' in (lantern_certbot_result.stdout | lower)

- name: Deploy nginx reverse proxy config for Lantern with TLS
  template:
    src: lantern_nginx.conf.j2
    dest: /etc/nginx/sites-available/lantern
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Enable nginx Lantern site
  file:
    src: /etc/nginx/sites-available/lantern
    dest: /etc/nginx/sites-enabled/lantern
    state: link
  notify: Reload nginx

- name: Test nginx configuration
  command: nginx -t
  changed_when: false

- name: Set up certbot auto-renewal cron job for Lantern
  cron:
    name: "certbot auto-renew lantern"
    job: "certbot renew --quiet --deploy-hook 'systemctl reload nginx'"
    minute: "15"
    hour: "3"
    state: present
