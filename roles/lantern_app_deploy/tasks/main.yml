- name: Ensure Lantern app release artifact root exists on controller
  delegate_to: localhost
  file:
    path: "{{ lantern_app_deploy_controller_release_root }}"
    state: directory
    mode: "{{ lantern_app_deploy_directory_mode }}"
  run_once: true

- name: Sync Lantern repo on controller
  delegate_to: localhost
  become: false
  git:
    repo: "{{ lantern_app_deploy_repo_url }}"
    dest: "{{ lantern_app_deploy_repo_dir }}"
    version: "{{ lantern_app_deploy_repo_version }}"
    update: true
    force: true
  run_once: true

- name: Read existing Lantern app bundle fingerprint on controller
  delegate_to: localhost
  become: false
  stat:
    path: "{{ lantern_app_deploy_bundle_fingerprint_path }}"
  register: lantern_app_deploy_bundle_fingerprint_stat
  run_once: true

- name: Load existing Lantern app bundle fingerprint on controller
  delegate_to: localhost
  become: false
  slurp:
    src: "{{ lantern_app_deploy_bundle_fingerprint_path }}"
  register: lantern_app_deploy_bundle_fingerprint_slurp
  when: lantern_app_deploy_bundle_fingerprint_stat.stat.exists
  run_once: true

- name: Calculate Lantern app bundle fingerprint on controller
  delegate_to: localhost
  become: false
  shell: |
    python3 - "{{ lantern_app_deploy_source_dir }}" <<'PY'
    import hashlib
    import os
    import sys

    root = sys.argv[1]
    digest = hashlib.sha256()

    for dirpath, dirnames, filenames in os.walk(root):
        dirnames.sort()
        filenames.sort()
        for name in filenames:
            path = os.path.join(dirpath, name)
            rel = os.path.relpath(path, root)
            digest.update(rel.encode("utf-8"))
            digest.update(b"\0")
            with open(path, "rb") as handle:
                for chunk in iter(lambda: handle.read(65536), b""):
                    digest.update(chunk)

    print(digest.hexdigest())
    PY
  args:
    executable: /bin/sh
  register: lantern_app_deploy_bundle_fingerprint_result
  changed_when: false
  run_once: true

- name: Decide whether Lantern app bundle archive should be rebuilt on controller
  delegate_to: localhost
  become: false
  set_fact:
    lantern_app_deploy_bundle_fingerprint: "{{ lantern_app_deploy_bundle_fingerprint_result.stdout | trim }}"
    lantern_app_deploy_bundle_fingerprint_short: "{{ lantern_app_deploy_bundle_fingerprint_result.stdout | trim | regex_replace('^(.{8}).*$', '\\1') }}"
    lantern_app_deploy_previous_bundle_fingerprint: >-
      {{
        (
          lantern_app_deploy_bundle_fingerprint_slurp.content
          | default('')
          | b64decode
          | trim
        )
        if lantern_app_deploy_bundle_fingerprint_stat.stat.exists
        else ''
      }}
    lantern_app_deploy_bundle_changed: >-
      {{
        (
          not lantern_app_deploy_bundle_fingerprint_stat.stat.exists
        )
        or (
          (
            lantern_app_deploy_bundle_fingerprint_slurp.content
            | default('')
            | b64decode
            | trim
          ) != (lantern_app_deploy_bundle_fingerprint_result.stdout | trim)
        )
      }}
  run_once: true

- name: Find Lantern app archives on controller
  delegate_to: localhost
  become: false
  find:
    paths: "{{ lantern_app_deploy_controller_release_root }}"
    patterns: "{{ lantern_app_deploy_archive_glob }}"
    file_type: file
  register: lantern_app_deploy_archive_find
  run_once: true

- name: Select newest Lantern app archive on controller
  delegate_to: localhost
  become: false
  set_fact:
    lantern_app_deploy_latest_archive_path: >-
      {{
        (lantern_app_deploy_archive_find.files
        | sort(attribute='mtime', reverse=true)
        | first).path
        if lantern_app_deploy_archive_find.matched | int > 0
        else ''
      }}
  run_once: true

- name: Build Lantern app bundle archive on controller when bundle changed
  delegate_to: localhost
  shell: >-
    umask 022 &&
    tar -C "{{ lantern_app_deploy_repo_dir }}/apps" -czf "{{ lantern_app_deploy_archive_path }}" "{{ lantern_app_id }}" &&
    printf '%s\n' "{{ lantern_app_deploy_bundle_fingerprint }}" > "{{ lantern_app_deploy_bundle_fingerprint_path }}"
  args:
    executable: /bin/sh
  when:
    - lantern_app_deploy_bundle_changed or lantern_app_deploy_latest_archive_path == ""
  run_once: true

- name: Use freshly built Lantern app archive on controller
  delegate_to: localhost
  set_fact:
    lantern_app_deploy_latest_archive_path: "{{ lantern_app_deploy_archive_path }}"
  when:
    - lantern_app_deploy_bundle_changed or lantern_app_deploy_latest_archive_path == ""
  run_once: true

- name: Stat Lantern app archive on controller
  delegate_to: localhost
  stat:
    path: "{{ lantern_app_deploy_latest_archive_path }}"
  register: lantern_app_deploy_local_archive_stat
  run_once: true

- name: Stat Lantern app deployed archive marker on target host
  stat:
    path: "{{ lantern_app_deploy_remote_app_dir }}/.deployed-archive"
  register: lantern_app_deploy_remote_deployed_archive_stat

- name: Load Lantern app deployed archive marker on target host
  slurp:
    src: "{{ lantern_app_deploy_remote_app_dir }}/.deployed-archive"
  register: lantern_app_deploy_remote_deployed_archive_slurp
  when: lantern_app_deploy_remote_deployed_archive_stat.stat.exists

- name: Read Lantern app deployed archive marker on target host
  set_fact:
    lantern_app_deploy_remote_deployed_archive_basename: >-
      {{
        (
          lantern_app_deploy_remote_deployed_archive_slurp.content
          | default('')
          | b64decode
          | trim
        )
        if lantern_app_deploy_remote_deployed_archive_stat.stat.exists
        else ''
      }}

- name: Decide whether Lantern app archive should be deployed
  set_fact:
    lantern_app_deploy_local_archive_mtime: "{{ lantern_app_deploy_local_archive_stat.stat.mtime | default(0) | int }}"
    lantern_app_deploy_local_archive_size: "{{ lantern_app_deploy_local_archive_stat.stat.size | default(0) | int }}"
    lantern_app_deploy_local_archive_basename: "{{ lantern_app_deploy_latest_archive_path | basename }}"
    lantern_app_deploy_deploy_archive: >-
      {{
        lantern_app_deploy_local_archive_basename != lantern_app_deploy_remote_deployed_archive_basename
      }}

- name: Ensure Lantern service group exists on target host
  group:
    name: "{{ lantern_app_deploy_group }}"
    system: true

- name: Ensure Lantern service user exists on target host
  user:
    name: "{{ lantern_app_deploy_owner }}"
    group: "{{ lantern_app_deploy_group }}"
    system: true
    home: /srv/lantern
    create_home: false

- name: Ensure Lantern app deployment root exists
  file:
    path: "{{ lantern_app_deploy_remote_root }}"
    state: directory
    owner: "{{ lantern_app_deploy_owner }}"
    group: "{{ lantern_app_deploy_group }}"
    mode: "{{ lantern_app_deploy_directory_mode }}"

- name: Copy Lantern app archive to target host
  copy:
    src: "{{ lantern_app_deploy_latest_archive_path }}"
    dest: "{{ lantern_app_deploy_remote_archive_path }}"
    owner: "{{ lantern_app_deploy_owner }}"
    group: "{{ lantern_app_deploy_group }}"
    mode: "0644"
  when: lantern_app_deploy_deploy_archive

- name: Extract Lantern app bundle on target host
  unarchive:
    src: >-
      {{
        lantern_app_deploy_remote_archive_path
        if lantern_app_deploy_deploy_archive
        else lantern_app_deploy_latest_archive_path
      }}
    dest: "{{ lantern_app_deploy_remote_root }}"
    remote_src: true
    owner: "{{ lantern_app_deploy_owner }}"
    group: "{{ lantern_app_deploy_group }}"
    extra_opts:
      - --no-same-owner
  when: lantern_app_deploy_deploy_archive

- name: Record deployed Lantern app archive basename on target host
  copy:
    dest: "{{ lantern_app_deploy_remote_root }}/{{ lantern_app_id }}.deployed-archive"
    content: "{{ lantern_app_deploy_remote_archive_path | basename }}\n"
    owner: "{{ lantern_app_deploy_owner }}"
    group: "{{ lantern_app_deploy_group }}"
    mode: "0644"
  when: lantern_app_deploy_deploy_archive

- name: Ensure deployed Lantern app permissions are owned by lantern
  when: lantern_app_deploy_owner != "root"
  file:
    path: "{{ lantern_app_deploy_remote_app_dir }}"
    state: directory
    owner: "{{ lantern_app_deploy_owner }}"
    group: "{{ lantern_app_deploy_group }}"
    recurse: true
