- name: Host Archive Prep
  block:
    - name: Ensure Lantern app release artifact root exists on controller
      file:
        path: "{{ lantern_app_deploy_controller_release_root }}"
        state: directory
        mode: "{{ lantern_app_deploy_directory_mode }}"

    - name: Sync Lantern repo on controller
      git:
        repo: "{{ lantern_app_deploy_repo_url }}"
        dest: "{{ lantern_app_deploy_repo_dir }}"
        version: "{{ lantern_app_deploy_repo_version }}"
        update: true
        force: true
      when: update_repo

    - name: Generate Lantern app archive stamp on controller
      set_fact:
        lantern_app_deploy_archive_stamp: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"

    - name: Render finalized {{ app_id }} app root on controller before packaging
      ansible.builtin.command:
        cmd: >-
          sh scripts/lantern_runtime.sh build app {{ app_id }}
          --app-dir {{ lantern_app_deploy_repo_dir }}/apps/{{ app_id }}
          --build-dir {{ lantern_app_deploy_repo_dir }}/dist
          --text
        chdir: "{{ lantern_app_deploy_repo_dir }}"

    - name: Verify finalized {{ app_id }} app root exists on controller
      ansible.builtin.stat:
        path: "{{ lantern_app_deploy_controller_app_root }}/lantern-app-manifest.json"
      register: lantern_app_deploy_controller_manifest

    - name: Fail when finalized {{ app_id }} app root was not emitted on controller
      ansible.builtin.fail:
        msg: >-
          expected finalized app root at {{ lantern_app_deploy_controller_app_root }} but lantern-app-manifest.json was not emitted
      when: not lantern_app_deploy_controller_manifest.stat.exists

    - name: Package finalized Lantern app root archive on controller
      shell: |
        set -eu
        umask 022
        archive_source_dir="{{ lantern_app_deploy_controller_app_root }}"
        archive_path="{{ lantern_app_deploy_archive_path }}"
        tar_args=''
        {% for prefix in lantern_app_deploy_bundle_exclude_prefixes %}
        tar_args="$tar_args --exclude={{ prefix }}"
        {% endfor %}
        {% for exact_path in lantern_app_deploy_bundle_exclude_exact_paths %}
        tar_args="$tar_args --exclude={{ exact_path }}"
        {% endfor %}
        {% for name in lantern_app_deploy_bundle_exclude_names %}
        tar_args="$tar_args --exclude={{ name }}"
        {% endfor %}
        {% for suffix in lantern_app_deploy_bundle_exclude_suffixes %}
        tar_args="$tar_args --exclude=*{{ suffix }}"
        {% endfor %}
        # shellcheck disable=SC2086
        tar -C "$archive_source_dir" $tar_args -czf "$archive_path" .
      args:
        executable: /bin/sh

  delegate_to: localhost
  become: false
  run_once: true
## END Host Archive Prep

- name: Ensure Lantern app directories exist on target host
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ lantern_app_deploy_owner }}"
    group: "{{ lantern_app_deploy_group }}"
    mode: "{{ lantern_app_deploy_directory_mode }}"
  loop:
    - "{{ lantern_app_deploy_remote_root }}"
    - "{{ lantern_app_deploy_remote_app_dir }}"

- name: Stage {{ app_id }} bundle in epytype_repo
  vars:
    epytype_repo_artifact_src: "{{ lantern_app_deploy_archive_path }}"
    epytype_repo_type: app
  import_role: { name: epytype_repo }

- name: Optionally clean Lantern app directory on target host before extraction
  shell: |
    set -eu
    app_dir="{{ lantern_app_deploy_remote_app_dir }}"
    find "$app_dir" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
  args:
    executable: /bin/sh
  when: clean_app | bool

- name: Extract Lantern app bundle on target host
  unarchive:
    src: "{{ epytype_repo }}/{{ lantern_app_deploy_archive_basename }}"
    dest: "{{ lantern_app_deploy_remote_app_dir }}"
    remote_src: true
    owner: "{{ lantern_app_deploy_owner }}"
    group: "{{ lantern_app_deploy_group }}"
    extra_opts:
      - --no-same-owner
  register: lantern_app_deploy_extract
  notify: Restart Lantern services


- name: Rewrite deployed {{ app_id }} artifact manifest app_root on target host
  ansible.builtin.replace:
    path: "{{ item }}"
    regexp: '("app_root"\s*:\s*")[^"]*(")'
    replace: '\1{{ lantern_app_deploy_remote_app_dir }}\2'
  loop:
    - "{{ lantern_app_deploy_remote_app_dir }}/manifest.json"
    - "{{ lantern_app_deploy_remote_app_dir }}/lantern-app-manifest.json"
  notify: Restart Lantern services

- name: Verify deployed {{ app_id }} artifact manifests exist and point at target app_root
  ansible.builtin.shell: |
    set -eu
    manifest_path="{{ lantern_app_deploy_remote_app_dir }}/manifest.json"
    app_manifest_path="{{ lantern_app_deploy_remote_app_dir }}/lantern-app-manifest.json"
    expected_root="{{ lantern_app_deploy_remote_app_dir }}"
    expected_pattern='"app_root"[[:space:]]*:[[:space:]]*"'"$expected_root"'"'
    [ -f "$manifest_path" ]
    [ -f "$app_manifest_path" ]
    grep -E "$expected_pattern" "$manifest_path" >/dev/null
    grep -E "$expected_pattern" "$app_manifest_path" >/dev/null
  args:
    executable: /bin/sh
  become: true
  become_user: "{{ lantern_app_deploy_owner }}"

- name: Prune older {{ app_id }} bundles
  vars:
    epytype_repo_type: app
    epytype_repo_keep: 2
  import_role:
    name: epytype_repo
    tasks_from: prune
  when: lantern_app_deploy_extract is succeeded
