lantern_app_deploy_repo_dir: "{{ playbook_dir }}/../lantern"
lantern_app_deploy_repo_url: git@github.com:jperry303/lantern.git
lantern_app_deploy_repo_version: HEAD
lantern_app_deploy_controller_release_root: "{{ lantern_app_deploy_repo_dir }}/dist/release/app"
lantern_app_deploy_archive_ext: tar.gz
lantern_app_deploy_archive_stamp: ""
lantern_app_deploy_archive_revision: ""
lantern_app_deploy_archive_basename: >-
  {{ app_id }}-{{ lantern_app_deploy_archive_stamp }}{{ lantern_app_deploy_archive_revision | ternary('-' ~ lantern_app_deploy_archive_revision, '') }}.{{ lantern_app_deploy_archive_ext }}
lantern_app_deploy_archive_path: "{{ lantern_app_deploy_controller_release_root }}/{{ lantern_app_deploy_archive_basename }}"

# Staged-archive repository (managed by roles/epytype_repo).
# epytype_repo_type values: pack (runtime/services) | app (apps under services).
epytype_repo_type: app
# Define how many versions to keep; minimum 2 (current + previous for rollback).
epytype_repo_keep: 2

lantern_app_deploy_remote_root: /srv/lantern/apps
lantern_app_deploy_remote_app_dir: "{{ lantern_app_deploy_remote_root }}/{{ app_id }}"
lantern_app_deploy_bundle_exclude_prefixes:
  - dist/
  - var/db/
  - var/backups/
lantern_app_deploy_bundle_exclude_exact_paths:
  - var/runtime-state.json
lantern_app_deploy_bundle_exclude_names:
  - .DS_Store
  - .archives
lantern_app_deploy_bundle_exclude_suffixes:
  - .tar
  - .tar.gz
  - .tgz
  - .zip
  - .gz
  - .bz2
  - .xz
  - .zst
  - .deb
  - .rpm
  - .apk
lantern_app_deploy_owner: lantern
lantern_app_deploy_group: lantern
lantern_app_deploy_directory_mode: "0755"
lantern_app_deploy_services:
  - lantern.service
  - lantern-ha.service
