- name: Resolve ll_repo from ll_repo_type
  ansible.builtin.set_fact:
    ll_repo: "{{ ll_repo_dir }}/{{ ll_repo_type }}"

- name: Prune archives in {{ ll_repo }} keeping newest {{ ll_repo_keep }}
  ansible.builtin.shell: |
    cd "{{ ll_repo }}" || exit 0
    ls -1t 2>/dev/null \
      | awk 'NR>{{ ll_repo_keep }}' \
      | xargs -r rm -f --
  args:
    executable: /bin/sh
  changed_when: false
