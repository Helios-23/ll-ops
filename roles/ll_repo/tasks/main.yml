- name: Set ll_repo directory based on ll_repo_type
  ansible.builtin.set_fact:
    ll_repo: "{{ ll_repo_dir }}/{{ ll_repo_type }}"

- name: Ensure {{ ll_repo }} exists
  ansible.builtin.file:
    path: "{{ ll_repo }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy archive from controller to {{ ll_repo }}
  ansible.builtin.copy:
    src: "{{ ll_repo_artifact_src }}"
    dest: "{{ ll_repo }}/"
    owner: root
    group: root
    mode: "0644"
  when: ll_repo_artifact_src | length > 0
