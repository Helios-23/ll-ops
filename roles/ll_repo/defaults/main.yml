# Staged-archive repository root.
ll_repo_type: pack        # pack | app
ll_repo_keep: 2           # current + previous = 2
ll_repo_dir: /opt/ll
# Derived per-type directory. /opt/ll/<type>/
#   pack  (runtime/services like the pharos deb): /opt/ll/pack
#   app   (apps running under those services):    /opt/ll/app

# Source path of the artifact on the controller. Caller sets this before
# importing the role. The role copies this file to {{ ll_repo }}/.
ll_repo_artifact_src: ""
