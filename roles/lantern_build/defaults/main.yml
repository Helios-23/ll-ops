# Build Epytype and Lantern as sibling checkouts of ops/ (one level up).
lantern_build_repo_dir: "{{ playbook_dir }}/../lantern"
lantern_build_epytype_repo_dir: "{{ playbook_dir }}/../epytype"
lantern_build_target: "{{ target | default('all') }}"
lantern_build_compose_dir: "{{ lantern_build_repo_dir }}/cross/docker"
lantern_build_all_targets:
  - linux-x86_64-gnu
  - linux-x86_64-musl
  - linux-aarch64-gnu
  - linux-riscv64-gnu
  - macos-universal
  - windows-x86_64-msvc
  - windows-arm64-msvc
lantern_build_selected_targets: >-
  {{
    lantern_build_all_targets
    if lantern_build_target == 'all'
    else [lantern_build_target]
  }}
lantern_build_binary_dir: "{{ lantern_build_repo_dir }}/dist/binaries"
lantern_build_package_dir: "{{ lantern_build_repo_dir }}/dist/packages"
# Each target produces a release artifact under lantern_build_package_dir.
# Verification accepts any of these extensions so the check works for every
# target, not just the linux-gnu ones that produce a .deb. Verification
# sidecars (.sha256, .asc, .manifest.json, .zst) are not patterns, so they
# are excluded.
lantern_build_release_artifacts:
  - "*.deb"
  - "*.rpm"
  - "*.apk"
  - "*.tar.gz"
  - "*.tgz"
  - "*.msix"
  - "*.zip"
