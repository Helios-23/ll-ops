- name: Host Archive Prep
  block:
    - name: Ensure Pharos app release artifact root exists on controller
      file:
        path: "{{ pharos_app_deploy_controller_release_root }}"
        state: directory
        mode: "{{ pharos_app_deploy_directory_mode }}"

    - name: Sync Pharos repo on controller
      git:
        repo: "{{ pharos_app_deploy_repo_url }}"
        dest: "{{ pharos_app_deploy_repo_dir }}"
        version: "{{ pharos_app_deploy_repo_version }}"
        update: true
        force: true
      when: update_repo

    - name: Generate Pharos app archive stamp on controller
      set_fact:
        pharos_app_deploy_archive_stamp: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"

    - name: Check for existing host-native Pharos docs renderer for app packaging
      ansible.builtin.stat:
        path: "{{ pharos_app_deploy_repo_dir }}/bin/pharos"
      register: pharos_app_deploy_docs_renderer_bin

    - name: Compute docs-renderer binary fingerprint for app packaging
      ansible.builtin.shell: |
        python3 - <<'PY'
        from pathlib import Path
        import hashlib

        repo = Path('.').resolve()
        digest = hashlib.sha256()
        source_path = repo / 'src/native_runtime/c/pharos_runtime.c'
        source_text = source_path.read_text(encoding='utf-8')

        def extract_function(signature: str) -> str:
            start = source_text.find(signature)
            if start < 0:
                raise SystemExit(f'missing docs renderer signature: {signature}')
            brace = source_text.find('{', start)
            if brace < 0:
                raise SystemExit(f'missing opening brace for: {signature}')
            depth = 0
            for index in range(brace, len(source_text)):
                char = source_text[index]
                if char == '{':
                    depth += 1
                elif char == '}':
                    depth -= 1
                    if depth == 0:
                        return source_text[start:index + 1]
            raise SystemExit(f'missing closing brace for: {signature}')

        for signature in (
            'static const char *dev_docs_directory_index_html_native(void) {',
            'static int build_dev_docs_directory_native(const char *app_root, const char *artifact_dir) {'
        ):
            digest.update(signature.encode('utf-8'))
            digest.update(b'\0')
            digest.update(extract_function(signature).encode('utf-8'))
            digest.update(b'\0')
        print(digest.hexdigest())
        PY
      args:
        chdir: "{{ pharos_app_deploy_repo_dir }}"
      register: pharos_app_deploy_docs_renderer_fingerprint
      changed_when: false

    - name: Check saved docs-renderer fingerprint for app packaging
      ansible.builtin.stat:
        path: "{{ pharos_app_deploy_repo_dir }}/dist/.dev_docs_renderer_fingerprint"
      register: pharos_app_deploy_docs_renderer_fingerprint_file

    - name: Read saved docs-renderer fingerprint for app packaging
      ansible.builtin.slurp:
        path: "{{ pharos_app_deploy_repo_dir }}/dist/.dev_docs_renderer_fingerprint"
      register: pharos_app_deploy_saved_docs_renderer_fingerprint_raw
      when: pharos_app_deploy_docs_renderer_fingerprint_file.stat.exists

    - name: Decide whether host-native Pharos docs renderer must rebuild for app packaging
      ansible.builtin.set_fact:
        pharos_app_deploy_rebuild_docs_renderer: >-
          {{
            (not pharos_app_deploy_docs_renderer_bin.stat.exists)
            or (
              (pharos_app_deploy_docs_renderer_fingerprint.stdout | trim)
              !=
              (
                (pharos_app_deploy_saved_docs_renderer_fingerprint_raw.content | b64decode | trim)
                if pharos_app_deploy_docs_renderer_fingerprint_file.stat.exists
                else ''
              )
            )
          }}

    - name: Build host-native Pharos binary required for dynamic app packaging
      ansible.builtin.command:
        cmd: >-
          sh scripts/build_native.sh build-target macos-universal {{ pharos_app_deploy_repo_dir }}/dist/native
        chdir: "{{ pharos_app_deploy_repo_dir }}"
      when: pharos_app_deploy_rebuild_docs_renderer

    - name: Save current docs-renderer fingerprint after app-packaging rebuild
      ansible.builtin.copy:
        dest: "{{ pharos_app_deploy_repo_dir }}/dist/.dev_docs_renderer_fingerprint"
        content: "{{ pharos_app_deploy_docs_renderer_fingerprint.stdout | trim }}\n"
        mode: "0644"
      when: pharos_app_deploy_rebuild_docs_renderer

    - name: Show docs renderer reuse decision for app packaging
      ansible.builtin.debug:
        msg: >-
          {{
            'Rebuilt host-native Pharos docs renderer for app packaging.'
            if pharos_app_deploy_rebuild_docs_renderer
            else 'Reusing existing host-native Pharos docs renderer for app packaging.'
          }}

    - name: Render finalized {{ app_id }} app root on controller before packaging
      ansible.builtin.command:
        cmd: >-
          sh scripts/pharos_runtime.sh build app {{ app_id }}
          --build-dir {{ pharos_app_deploy_repo_dir }}/dist
          --packaging
          --text
        chdir: "{{ pharos_app_deploy_repo_dir }}"

    - name: Verify finalized {{ app_id }} app root exists on controller
      ansible.builtin.stat:
        path: "{{ pharos_app_deploy_controller_app_root }}/pharos.app.json"
      register: pharos_app_deploy_controller_manifest

    - name: Fail when finalized {{ app_id }} app root was not emitted on controller
      ansible.builtin.fail:
        msg: >-
          expected finalized app root at {{ pharos_app_deploy_controller_app_root }} but pharos.app.json was not emitted
      when: not pharos_app_deploy_controller_manifest.stat.exists

    - name: Package finalized Pharos app root archive on controller
      shell: |
        set -eu
        umask 022
        archive_source_dir="{{ pharos_app_deploy_controller_app_root }}"
        archive_path="{{ pharos_app_deploy_archive_path }}"
        tar_args=''
        {% for prefix in pharos_app_deploy_bundle_exclude_prefixes %}
        tar_args="$tar_args --exclude={{ prefix }}"
        {% endfor %}
        {% for exact_path in pharos_app_deploy_bundle_exclude_exact_paths %}
        tar_args="$tar_args --exclude={{ exact_path }}"
        {% endfor %}
        {% for name in pharos_app_deploy_bundle_exclude_names %}
        tar_args="$tar_args --exclude={{ name }}"
        {% endfor %}
        {% for suffix in pharos_app_deploy_bundle_exclude_suffixes %}
        tar_args="$tar_args --exclude=*{{ suffix }}"
        {% endfor %}
        # shellcheck disable=SC2086
        tar -C "$archive_source_dir" $tar_args -czf "$archive_path" .
      args:
        executable: /bin/sh

  delegate_to: localhost
  become: false
  run_once: true
## END Host Archive Prep

- name: Ensure Pharos app directories exist on target host
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ pharos_app_deploy_owner }}"
    group: "{{ pharos_app_deploy_group }}"
    mode: "{{ pharos_app_deploy_directory_mode }}"
  loop:
    - "{{ pharos_app_deploy_remote_root }}"
    - "{{ pharos_app_deploy_remote_app_dir }}"

- name: Stage {{ app_id }} bundle in ll_repo
  vars:
    ll_repo_artifact_src: "{{ pharos_app_deploy_archive_path }}"
    ll_repo_type: app
  import_role: { name: ll_repo }

- name: Optionally clean Pharos app directory on target host before extraction
  shell: |
    set -eu
    app_dir="{{ pharos_app_deploy_remote_app_dir }}"
    find "$app_dir" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
  args:
    executable: /bin/sh
  when: clean_app | bool

- name: Extract Pharos app bundle on target host
  unarchive:
    src: "{{ ll_repo }}/{{ pharos_app_deploy_archive_basename }}"
    dest: "{{ pharos_app_deploy_remote_app_dir }}"
    remote_src: true
    owner: "{{ pharos_app_deploy_owner }}"
    group: "{{ pharos_app_deploy_group }}"
    extra_opts:
      - --no-same-owner
  register: pharos_app_deploy_extract
  notify: Restart Pharos services


- name: Verify deployed {{ app_id }} packaged manifest exists and preserves relocatable app_root
  ansible.builtin.shell: |
    set -eu
    manifest_path="{{ pharos_app_deploy_remote_app_dir }}/pharos.app.json"
    relocatable_pattern='"app_root"[[:space:]]*:[[:space:]]*"\."'
    [ -f "$manifest_path" ]
    grep -E "$relocatable_pattern" "$manifest_path" >/dev/null
  args:
    executable: /bin/sh
  become: true

- name: Prune older {{ app_id }} bundles
  vars:
    ll_repo_type: app
    ll_repo_keep: 2
  import_role:
    name: ll_repo
    tasks_from: prune
  when: pharos_app_deploy_extract is succeeded
