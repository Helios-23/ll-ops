pharos_deploy_package_src: ""
# Staged-archive repository (managed by roles/ll_repo).
# ll_repo_type values: pack (runtime/services) | app (apps under services).
# Pharos deb is a runtime/service artifact, so type is pack.
ll_repo_type: pack
# Define how many versions to keep; minimum 2 (current + previous for rollback).
ll_repo_keep: 2
# Note: ll_repo is always usable as the artifact copy destination and as
#       the install source base on the target host (<ll_repo>/<basename>).

pharos_deploy_owner: pharos
pharos_deploy_group: pharos
pharos_deploy_log_dir: /var/log/pharos
pharos_deploy_services:
  - pharos.service
  - pharos-ha.service
# These two defaults mirror what `roles/pharos_build/defaults/main.yml`
# defines in the build play. The deploy role runs in a separate play
# (hosts: web0) so it does not inherit pharos_build's defaults, and is
# therefore redeclared here. If the build layout changes, update both
# files. The deploy role always installs pharos_*.deb because that is
# the runtime contract with dpkg; the build role's broader artifact
# patterns (.rpm, .apk, .tar.gz, etc.) intentionally coexist with this.
pharos_build_repo_dir: "{{ playbook_dir }}/../pharos"
pharos_build_package_dir: "{{ pharos_build_repo_dir }}/dist/packages"
pharos_deploy_package_glob: "pharos_*.deb"
