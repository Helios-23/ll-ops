epytype_release_project_name: "Epytype"
epytype_release_repo_dir: "{{ playbook_dir }}/../epytype"
epytype_release_remote: origin
epytype_release_branch: release

# The final release is major.minor.release.
# Users normally edit major/minor by hand and let the role increment release.
epytype_release_major_version: 0
epytype_release_minor_version: 7
epytype_release_number: ""

# Set epytype_release_version to an explicit x.y.z value only for overrides.
epytype_release_version: ""
epytype_release_date: "{{ lookup('pipe', 'date +%F') }}"

epytype_release_run_checks: true
epytype_release_push: true
epytype_release_allow_dirty: false
epytype_release_create_tag: true

# The GitHub owner/repo used for README CI links and the Forgejo release workflow.
epytype_release_github_repo: "jperry303/epytype"
epytype_release_ci_badge_link_repo: "{{ epytype_release_github_repo }}"
epytype_release_push_github: "{{ epytype_release_github_repo | length > 0 }}"
epytype_release_github_remote: github
epytype_release_github_remote_url: "https://github.com/{{ epytype_release_github_repo }}.git"
epytype_release_github_exclude_paths:
  - docs/release-automation.md
epytype_release_github_mirror_commit_message: "release: prepare GitHub mirror {{ epytype_release_next_tag }}"

epytype_release_commit_message: "release: prepare v{{ epytype_release_next_version }}"
epytype_release_git_user_name: "epytype-release"
epytype_release_git_user_email: "epytype-release@users.noreply.local"

epytype_release_current_version_command: >-
  sed -n 's/.*exists release_version:.*value "\([^"]*\)".*/\1/p' scripts/release_check.epy | head -n1
epytype_release_current_version_error_message: "Could not read release_version from scripts/release_check.epy"
epytype_release_version_reference_exclude_paths:
  - CHANGELOG.md
  - docs/release-automation.md

epytype_release_policy_marker_enabled: true
epytype_release_policy_marker_path: "{{ epytype_release_repo_dir }}/scripts/release_check.epy"
epytype_release_policy_marker_regexp: '(exists changelog_release_marker: role "release_check_changelog_marker", version "{{ epytype_release_next_version | regex_escape }}", date ")[^"]+(", value "## \[{{ epytype_release_next_version | regex_escape }}\] - )[^"]+(";)'
epytype_release_policy_marker_replace: '\1{{ epytype_release_date }}\2{{ epytype_release_date }}\3'

epytype_release_checklist_marker_enabled: true
epytype_release_checklist_marker_path: "{{ epytype_release_repo_dir }}/RELEASE.md"
epytype_release_checklist_marker_regexp: '## \[{{ epytype_release_next_version | regex_escape }}\] - [0-9]{4}-[0-9]{2}-[0-9]{2}'
epytype_release_checklist_marker_replace: '## [{{ epytype_release_next_version }}] - {{ epytype_release_date }}'

epytype_release_changelog_enabled: true
epytype_release_changelog_path: "{{ epytype_release_repo_dir }}/CHANGELOG.md"
epytype_release_changelog_heading_template: "## [{{ epytype_release_next_version }}] - {{ epytype_release_date }}"
epytype_release_changelog_insert_regexp: '(## Unreleased\n)'
epytype_release_changelog_insert_replace: '\1\n## [{{ epytype_release_next_version }}] - {{ epytype_release_date }}\n\n- Release {{ epytype_release_next_version }}.\n'
epytype_release_extra_add_paths:
  - CHANGELOG.md

epytype_release_checks_command: |
  set -euo pipefail
  scripts/epytype-stage0-backend setup-toolchain
  scripts/epytype-stage0 tooling install-cli --execute --build-dir target/release-stage0
  epm check --execute --build-dir target/release-check
  epm list --build-dir target/release-check
  epytype tooling build-release --execute --build-dir target/release-binary
  epytype tooling stage-binaries --target dist/binaries --build-dir target/release-check --source-commit "$(git rev-parse HEAD)"
  epytype tooling verify-binary-artifacts --target dist/binaries --build-dir target/release-check
  epytype tooling release-check --build-dir target/release-check
