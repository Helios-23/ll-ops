- name: Ensure Forgejo pull SSH directory exists
  file:
    path: "{{ forgejo_pull_ssh_dir }}"
    state: directory
    owner: "{{ forgejo_pull_user }}"
    group: "{{ forgejo_pull_group }}"
    mode: "0700"

- name: Install Forgejo pull private key
  copy:
    src: "{{ forgejo_pull_private_key_src }}"
    dest: "{{ forgejo_pull_private_key_dest }}"
    owner: "{{ forgejo_pull_user }}"
    group: "{{ forgejo_pull_group }}"
    mode: "0600"

- name: Install Forgejo pull public key
  copy:
    src: "{{ forgejo_pull_public_key_src }}"
    dest: "{{ forgejo_pull_public_key_dest }}"
    owner: "{{ forgejo_pull_user }}"
    group: "{{ forgejo_pull_group }}"
    mode: "0644"

- name: Install Forgejo pull FIPS private key
  copy:
    src: "{{ forgejo_pull_fips_private_key_src }}"
    dest: "{{ forgejo_pull_fips_private_key_dest }}"
    owner: "{{ forgejo_pull_user }}"
    group: "{{ forgejo_pull_group }}"
    mode: "0600"

- name: Install Forgejo pull FIPS public key
  copy:
    src: "{{ forgejo_pull_fips_public_key_src }}"
    dest: "{{ forgejo_pull_fips_public_key_dest }}"
    owner: "{{ forgejo_pull_user }}"
    group: "{{ forgejo_pull_group }}"
    mode: "0644"

- name: Scan Forgejo host key
  command: "ssh-keyscan -T 5 -t rsa -p {{ forgejo_pull_ssh_port }} {{ forgejo_pull_known_host_ip }}"
  register: forgejo_pull_host_keyscan
  changed_when: false
  failed_when: false

- name: Normalize Forgejo known_hosts entry
  set_fact:
    forgejo_pull_known_hosts_content: >-
      {% set scan = forgejo_pull_host_keyscan.stdout_lines | first | default('') %}
      {% if scan %}
      {% set parts = scan.split() %}
      {{ forgejo_pull_host_key_alias }} {{ parts[1] }} {{ parts[2] }}
      {% endif %}

- name: Write Forgejo known_hosts entry
  copy:
    dest: "{{ forgejo_pull_known_hosts_dest }}"
    owner: "{{ forgejo_pull_user }}"
    group: "{{ forgejo_pull_group }}"
    mode: "0644"
    content: "{{ forgejo_pull_known_hosts_content }}\n"
  when: forgejo_pull_known_hosts_content | default('') | length > 0

- name: Write SSH config for Forgejo pulls
  copy:
    dest: "{{ forgejo_pull_ssh_config_dest }}"
    owner: "{{ forgejo_pull_user }}"
    group: "{{ forgejo_pull_group }}"
    mode: "0644"
    content: |
      Host {{ forgejo_pull_known_host }}
        IdentitiesOnly yes
        HostName {{ forgejo_pull_known_host_ip }}
        Port {{ forgejo_pull_ssh_port }}
        HostKeyAlias {{ forgejo_pull_host_key_alias }}
        HostKeyAlgorithms rsa-sha2-256
        PubkeyAcceptedAlgorithms rsa-sha2-256
        KexAlgorithms diffie-hellman-group14-sha256
        Ciphers aes128-ctr
        ProxyCommand none
        ProxyJump none
        IdentityFile {{ forgejo_pull_private_key_dest }}
        IdentityFile {{ forgejo_pull_fips_private_key_dest }}
        CheckHostIP no
        StrictHostKeyChecking yes
        User git

- name: Set repo0 git identity for local builds
  copy:
    dest: "{{ forgejo_pull_home }}/.gitconfig"
    owner: "{{ forgejo_pull_user }}"
    group: "{{ forgejo_pull_group }}"
    mode: "0644"
    content: |
      [user]
        name = devops
        email = devops@epytype.org

      [url "git@repo.epytype.org:"]
        insteadOf = https://repo.epytype.org/
