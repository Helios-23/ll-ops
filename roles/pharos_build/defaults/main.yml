# Build Epytype and Pharos as sibling checkouts of ops/ (one level up).
pharos_build_repo_dir: "{{ playbook_dir }}/../pharos"
pharos_build_epytype_repo_dir: "{{ playbook_dir }}/../epytype"
pharos_build_target: "{{ target | default('all') }}"
pharos_build_compose_dir: "{{ pharos_build_repo_dir }}/cross/docker"
pharos_build_all_targets:
  - linux-x86_64-gnu
  - linux-x86_64-musl
  - linux-aarch64-gnu
  - linux-riscv64-gnu
  - macos-universal
  - windows-x86_64-msvc
  - windows-arm64-msvc
pharos_build_selected_targets: >-
  {{
    pharos_build_all_targets
    if pharos_build_target == 'all'
    else [pharos_build_target]
  }}
pharos_build_binary_dir: "{{ pharos_build_repo_dir }}/dist/binaries"
pharos_build_package_dir: "{{ pharos_build_repo_dir }}/dist/packages"
# Each target produces one or more release artifacts under
# pharos_build_package_dir. Keep this list aligned with
# pharos/cross/bin/package-pharos-artifacts and the release workflow so
# verification reports every package format we intentionally emit.
# Verification sidecars (.sha256, .asc, .manifest.json) are excluded.
pharos_build_release_artifacts:
  - "*.deb"
  - "*.rpm"
  - "*.apk"
  - "*.pkg.tar.zst"
  - "*.ebuild"
  - "*.pkg"
  - "*.rb"
  - "*.tar.gz"
  - "*.tgz"
  - "*.msix"
  - "*.zip"
