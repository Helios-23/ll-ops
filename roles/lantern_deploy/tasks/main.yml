- name: Resolve Lantern package source from build output
  set_fact:
    lantern_deploy_package_src: >-
      {{
        hostvars['localhost']['lantern_deploy_package_src']
        | default(lantern_deploy_package_src | default(''))
      }}

- name: Build Lantern Debian package on controller when missing
  delegate_to: localhost
  command: scripts/package_deb.sh "{{ lantern_release_output_dir }}"
  args:
    chdir: "{{ lantern_release_repo_dir }}"
  environment:
    EPYTYPE_BINARY_DIR: "{{ lantern_release_epytype_binary_dir }}"
  register: lantern_release_package_build
  changed_when: true
  when: lantern_deploy_package_src | length == 0

- name: Record Lantern package path from controller build
  set_fact:
    lantern_deploy_package_src: "{{ lantern_release_package_build.stdout_lines | last }}"
  when: lantern_deploy_package_src | length == 0

- name: Fail when Lantern package path is still missing
  fail:
    msg: "Lantern package was not produced by the build step"
  when: lantern_deploy_package_src | length == 0

- name: Copy Lantern package to target host
  copy:
    src: "{{ lantern_deploy_package_src }}"
    dest: "{{ lantern_deploy_package_dest }}"
    owner: root
    group: root
    mode: "0644"

- name: Install Lantern package
  apt:
    deb: "{{ lantern_deploy_package_dest }}"
    state: present

- name: Ensure Lantern services are enabled and started
  systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop: "{{ lantern_deploy_services }}"

- name: Remove staged Lantern package from target host
  file:
    path: "{{ lantern_deploy_package_dest }}"
    state: absent
