- name: Resolve Lantern package source from build output
  set_fact:
    lantern_deploy_package_src: >-
      {{
        hostvars['localhost']['lantern_deploy_package_src']
        | default(lantern_deploy_package_src | default(''))
      }}

- name: Find latest Lantern package on controller when source is unspecified
  delegate_to: localhost
  become: false
  find:
    paths: "{{ lantern_release_output_dir }}"
    patterns: "{{ lantern_release_output_glob }}"
    file_type: file
  register: lantern_deploy_package_find
  when: lantern_deploy_package_src == ""
  run_once: true

- name: Select latest Lantern package on controller when source is unspecified
  delegate_to: localhost
  become: false
  set_fact:
    lantern_deploy_package_src: >-
      {{
        (lantern_deploy_package_find.files
        | sort(attribute='mtime', reverse=true)
        | first).path
        if lantern_deploy_package_find.matched | int > 0
        else ''
      }}
  when: lantern_deploy_package_src == ""
  run_once: true

- name: Fail when Lantern package source cannot be resolved
  fail:
    msg: >-
      Lantern package source could not be resolved. Build it with
      release.yaml or pass lantern_deploy_package_src explicitly.
  when: lantern_deploy_package_src == ""

- name: Copy Lantern package to target host
  copy:
    src: "{{ lantern_deploy_package_src }}"
    dest: "{{ lantern_deploy_package_dest }}"
    owner: root
    group: root
    mode: "0644"

- name: Install Lantern package
  shell: >
    set -e &&
    dpkg -i "{{ lantern_deploy_package_dest }}" &&
    apt-get -f install -y
  args:
    executable: /bin/sh
  register: lantern_deploy_install

- name: Ensure Lantern log directory exists on target host
  file:
    path: /var/log/lantern
    state: directory
    owner: lantern
    group: lantern
    mode: "0755"

- name: Restart Lantern services after package install
  systemd:
    name: "{{ item }}"
    enabled: true
    state: restarted
  loop: "{{ lantern_deploy_services }}"

- name: Find stale Lantern packages on target host
  find:
    paths: "{{ lantern_deploy_package_dest_dir }}"
    patterns: "lantern_*.deb"
    file_type: file
  register: lantern_deploy_stale_packages

- name: Remove stale Lantern packages on target host
  file:
    path: "{{ item.path }}"
    state: absent
  loop: >-
    {{
      lantern_deploy_stale_packages.files
      | rejectattr('path', 'equalto', lantern_deploy_package_dest)
      | list
    }}
