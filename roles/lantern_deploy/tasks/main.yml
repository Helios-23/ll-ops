- name: Resolve Lantern package source from build output
  set_fact:
    lantern_deploy_package_src: >-
      {{
        hostvars['localhost']['lantern_deploy_package_src']
        | default(lantern_deploy_package_src | default(''))
      }}

- name: Find latest Lantern package on controller when source is unspecified
  delegate_to: localhost
  become: false
  find:
    paths: "{{ lantern_build_package_dir }}"
    patterns: "{{ lantern_deploy_package_glob }}"
    file_type: file
  register: lantern_deploy_package_find
  when: lantern_deploy_package_src == ""
  run_once: true

- name: Select latest Lantern package on controller when source is unspecified
  delegate_to: localhost
  become: false
  set_fact:
    lantern_deploy_package_src: >-
      {{
        (lantern_deploy_package_find.files
        | sort(attribute='mtime', reverse=true)
        | first).path
        if lantern_deploy_package_find.matched | int > 0
        else ''
      }}
  when: lantern_deploy_package_src == ""
  run_once: true

- name: Fail when Lantern package source cannot be resolved
  fail:
    msg: >-
      Lantern package source could not be resolved. Build it with
      build.yml -t lantern_build or pass lantern_deploy_package_src
      explicitly.
  when: lantern_deploy_package_src == ""

- name: Stage Lantern runtime package in epytype_repo
  vars:
    epytype_repo_artifact_src: "{{ lantern_deploy_package_src }}"
  import_role: { name: epytype_repo }

- name: Install Lantern package from staged repository
  shell: |
    set -e
    deb="{{ epytype_repo }}/$(ls -1t {{ epytype_repo }}/lantern_*.deb | head -1 | xargs -n1 basename)"
    dpkg -i "$deb" || (apt-get -f install -y && dpkg -i "$deb")
  args:
    executable: /bin/sh
  register: lantern_deploy_install
  notify: Restart Lantern services

- name: Prune older Lantern runtime packages
  vars:
    epytype_repo_type: pack
    epytype_repo_keep: 2
  import_role:
    name: epytype_repo
    tasks_from: prune
  when: lantern_deploy_install is succeeded
