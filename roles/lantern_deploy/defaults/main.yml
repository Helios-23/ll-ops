lantern_deploy_package_src: ""
lantern_deploy_package_dest_dir: /tmp
lantern_deploy_package_dest: "{{ lantern_deploy_package_dest_dir }}/{{ lantern_deploy_package_src | basename }}"
lantern_deploy_owner: lantern
lantern_deploy_group: lantern
lantern_deploy_log_dir: /var/log/lantern
lantern_deploy_services:
  - lantern.service
  - lantern-ha.service
# These two defaults mirror what `roles/lantern_build/defaults/main.yml`
# defines in the build play. The deploy role runs in a separate play
# (hosts: web0) so it does not inherit lantern_build's defaults, and is
# therefore redeclared here. If the build layout changes, update both
# files. The deploy role always installs lantern_*.deb because that is
# the runtime contract with dpkg; the build role's broader artifact
# patterns (.rpm, .apk, .tar.gz, etc.) intentionally coexist with this.
lantern_build_repo_dir: "{{ playbook_dir }}/../lantern"
lantern_build_package_dir: "{{ lantern_build_repo_dir }}/dist/packages"
lantern_deploy_package_glob: "lantern_*.deb"
