lantern_deploy_package_src: ""
lantern_deploy_package_dest_dir: /tmp
lantern_deploy_package_dest: "{{ lantern_deploy_package_dest_dir }}/{{ lantern_deploy_package_src | basename }}"
lantern_deploy_owner: lantern
lantern_deploy_group: lantern
lantern_deploy_log_dir: /var/log/lantern
lantern_deploy_services:
  - lantern.service
  - lantern-ha.service
lantern_release_repo_dir: "{{ playbook_dir }}/../lantern"
lantern_release_output_dir: "{{ lantern_release_repo_dir }}/dist/packages"
lantern_release_epytype_binary_dir: "{{ playbook_dir }}/../epytype/dist/binaries"
lantern_release_output_glob: "lantern_*.deb"
