- name: Ollama tasks
  tags: ollama
  block:
    - name: Create Ollama compose directory
      file:
        path: "{{ ollama_data_path }}"
        state: directory
        mode: "0755"

    - name: Copy Ollama compose file
      template:
        src: ollama.compose.yml.j2
        dest: "{{ ollama_data_path }}/docker-compose.yml"
        owner: root
        group: root
        mode: "0644"

    - name: Check for legacy Ollama Docker-volume model store
      stat:
        path: "{{ ollama_legacy_volume_models_path }}/manifests"
      register: ollama_legacy_models

    - name: Import legacy Ollama models into persistent bind mount
      command: rsync -a --ignore-existing --itemize-changes {{ ollama_legacy_volume_models_path }}/ {{ ollama_data_path }}/models/
      register: ollama_legacy_import
      when: ollama_legacy_models.stat.exists
      changed_when: ollama_legacy_import.stdout | length > 0

    - name: Verify Ollama compose file exists
      stat:
        path: "{{ ollama_data_path }}/docker-compose.yml"
      register: ollama_compose_check
      failed_when: false

    - name: Fail if Ollama compose file missing
      fail:
        msg: "Docker compose file not found at {{ ollama_data_path }}/docker-compose.yml"
      when: not ollama_compose_check.stat.exists

    - name: Install Ollama systemd service
      template:
        src: ollama.service.j2
        dest: /etc/systemd/system/ollama.service
        owner: root
        group: root
        mode: "0644"

    - name: Create Ollama network
      community.docker.docker_network:
        name: ai_network
        state: present

    - name: Enable and start Ollama service
      systemd:
        name: ollama.service
        state: started
        enabled: true
        daemon_reload: true

    - name: Check Ollama service status
      command: docker compose -f {{ ollama_data_path }}/docker-compose.yml ps
      register: ollama_status
      changed_when: false
      failed_when: false

    - name: Restart Ollama if unhealthy
      command: docker compose -f {{ ollama_data_path }}/docker-compose.yml restart
      when: ollama_status.rc != 0

    - name: Wait for Ollama API to be ready
      wait_for:
        port: "{{ ollama_port }}"
        delay: 5
