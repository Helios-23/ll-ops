- name: WebUI tasks
  tags: webui
  block:
    - name: Create Open WebUI compose directory
      file:
        path: "{{ open_webui_data_path }}"
        state: directory
        mode: "0755"

    - name: Copy Open WebUI compose file
      template:
        src: open-webui.compose.yml.j2
        dest: "{{ open_webui_data_path }}/docker-compose.yml"
        owner: root
        group: root
        mode: "0644"
      notify: restart open-webui

    - name: Copy Open WebUI GDRIVE service key
      template:
        src: service-key.json.j2
        dest: "{{ open_webui_data_path }}/service-key.json"
        owner: root
        group: root
        mode: "0644"
      notify: restart open-webui

    - name: Copy user whitelist file
      template:
        src: user-whitelist.txt.j2
        dest: "{{ open_webui_data_path }}/user-whitelist.txt"
        owner: root
        group: root
        mode: "0644"
      register: whitelist_file
      notify: restart open-webui

    - name: Copy user whitelist provisioning script
      template:
        src: user-whitelist.sh.j2
        dest: "{{ open_webui_data_path }}/user-whitelist.sh"
        owner: root
        group: root
        mode: "0755"
      register: whitelist_script
      notify: restart open-webui

    - name: Verify Open WebUI compose file exists
      stat:
        path: "{{ open_webui_data_path }}/docker-compose.yml"
      register: webui_compose_check
      failed_when: false

    - name: Fail if Open WebUI compose file missing
      fail:
        msg: "Docker compose file not found at {{ open_webui_data_path }}/docker-compose.yml"
      when: not webui_compose_check.stat.exists

    - name: Install Open WebUI systemd service
      template:
        src: open-webui.service.j2
        dest: /etc/systemd/system/open-webui.service
        owner: root
        group: root
        mode: "0644"

    - name: Enable and start Open WebUI service
      systemd:
        name: open-webui.service
        state: started
        enabled: true
        daemon_reload: true

    - name: Check Open WebUI service status
      command: docker compose -f {{ open_webui_data_path }}/docker-compose.yml ps
      register: webui_status
      changed_when: false
      failed_when: false

    - name: Restart Open WebUI if unhealthy
      command: docker compose -f {{ open_webui_data_path }}/docker-compose.yml restart
      when: webui_status.rc != 0

    - name: Wait for Open WebUI to be ready
      wait_for:
        port: "{{ agent_ui_port }}"
        delay: 5

    - name: Run user whitelist provisioning
      command: "{{ open_webui_data_path }}/user-whitelist.sh"
      environment:
        API: "http://localhost:{{ agent_ui_port }}/api/v1"
        WHITELIST_FILE: "{{ open_webui_data_path }}/user-whitelist.txt"
        DEFAULT_PASS: "changeme"
        COMPOSE_FILE: "{{ open_webui_data_path }}/docker-compose.yml"
      register: whitelist_result
      changed_when: false
      failed_when: false
      when:
        - whitelist_script is defined
        - whitelist_file is defined
        - whitelist_script is changed or whitelist_file is changed
      notify: restart open-webui

    - name: Debug whitelist result
      debug:
        var: whitelist_result
