- name: Install UFW
  apt:
    name: ufw
    state: present
    update_cache: true

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Set UFW default allow incoming (prevents lockout during setup)
  community.general.ufw:
    direction: incoming
    default: allow

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    default: allow

# Tailscale managed — no additional UFW rules needed
# - name: Allow SSH from home IP
#   community.general.ufw:
#     rule: allow
#     port: "22"
#     proto: tcp
#     from_ip: "{{ home_ip_address }}"

- name: Allow HTTP and HTTPS
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Enable NVIDIA Persistence Mode
  command: nvidia-smi -pm 1
  changed_when: false

- name: Install CPU power management tools
  apt:
    name:
      - linux-tools-generic
      - linux-tools-common
    state: present
    update_cache: true

- name: Set CPU Governor to Performance
  shell: cpupower frequency-set -g performance
  ignore_errors: true

- name: Create swap file for CPU offload overflow
  command:
    cmd: fallocate -l {{ (swap_size_mb / 1024) | round(0, 'ceil') | int }}G /swapfile
    creates: /swapfile
  when: swap_size_mb > 0

- name: Set swap file permissions
  file:
    path: /swapfile
    mode: "0600"
  when: swap_size_mb > 0

- name: Check if swap is already active
  command: swapon --show
  register: swap_check
  changed_when: false
  when: swap_size_mb > 0

- name: Format swap file
  command:
    cmd: mkswap /swapfile
  when: swap_size_mb > 0 and 'swapfile' not in swap_check.stdout

- name: Enable swap
  command:
    cmd: swapon /swapfile
  when: swap_size_mb > 0 and 'swapfile' not in swap_check.stdout

- name: Ensure swap is in fstab
  lineinfile:
    path: /etc/fstab
    line: "/swapfile none swap sw 0 0"
    state: present
  when: swap_size_mb > 0

- name: Tune Virtual Memory for AI stability
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: true
  loop:
    - { key: vm.swappiness, value: "10" }
    - { key: vm.dirty_ratio, value: "10" }
    - { key: vm.dirty_background_ratio, value: "5" }
    - { key: vm.overcommit_memory, value: "1" }

- name: Enable Transparent HugePages
  command:
    cmd: bash -c "echo always > /sys/kernel/mm/transparent_hugepage/enabled"
  changed_when: false
  failed_when: false

# Default compute mode (shared) is correct — allows Ollama + Open WebUI to coexist
# Skipping exclusive process mode: nvidia-smi -c 1

- name: Configure OOM score for Ollama process
  lineinfile:
    path: /etc/sysctl.d/99-ai-oom.conf
    line: "vm.oom_kill_allocating_task=0"
    create: true
    mode: "0644"
    owner: root
    group: root

- name: Reload sysctl settings
  command: sysctl -p /etc/sysctl.d/99-ai-oom.conf
  changed_when: false

- name: Create GPU memory watchdog script
  copy:
    dest: /usr/local/bin/gpu-oom-watcher.sh
    mode: "0755"
    content: |
      #!/bin/bash
      # Monitor GPU memory usage and restart Ollama if it gets stuck
      THRESHOLD=95
      STUCK_THRESHOLD=5

      while true; do
        USAGE=$(nvidia-smi --query-gpu=memory.used --format=csv,noheader,nounits | head -1 | tr -d ' ')
        TOTAL=$(nvidia-smi --query-gpu=memory.total --format=csv,noheader,nounits | head -1 | tr -d ' ')
        if [ "$TOTAL" -gt 0 ]; then
          PCT=$((USAGE * 100 / TOTAL))
          if [ "$PCT" -ge "$THRESHOLD" ]; then
            STUCK_COUNT=$((STUCK_COUNT + 1))
            if [ "$STUCK_COUNT" -ge "$STUCK_THRESHOLD" ]; then
              logger "GPU OOM watcher: restarting Ollama container"
              docker restart ollama
              STUCK_COUNT=0
              sleep 30
            fi
          else
            STUCK_COUNT=0
          fi
        fi
        sleep 10
      done

- name: Create GPU Watchdog systemd service
  copy:
    dest: /etc/systemd/system/gpu-oom-watcher.service
    content: |
      [Unit]
      Description=GPU OOM Watchdog for Ollama
      After=docker.service

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/gpu-oom-watcher.sh
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target

- name: Enable and start GPU Watchdog
  systemd:
    name: gpu-oom-watcher.service
    state: started
    enabled: true
    daemon_reload: true
