- name: Install NVIDIA drivers and dependencies
  apt:
    name:
      - "nvidia-driver-{{ nvidia_driver_version }}"
      - python3-pip
      - curl
      - certbot
    state: present
    update_cache: true

- name: Check if reboot is needed after driver install
  stat:
    path: /var/run/reboot-required
  register: reboot_required

- name: Reboot to load NVIDIA kernel modules
  reboot:
    reboot_timeout: 300
    connect_timeout: 300
    pre_reboot_delay: 5
  when: reboot_required.stat.exists or force_reboot | bool
  become: true

- name: Wait for system to come back online
  wait_for_connection:
    delay: 30
    timeout: 300
  when: reboot_required.stat.exists or force_reboot | bool

- name: Setup NVIDIA Container Toolkit repository
  shell: |
    curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
    curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
    sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
    tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
  args:
    creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

- name: Refresh apt cache after NVIDIA repo
  apt:
    update_cache: true

- name: Install NVIDIA Container Toolkit
  apt:
    name: nvidia-container-toolkit
    state: present
    update_cache: true

- name: Configure NVIDIA Container Runtime for Docker
  command: nvidia-ctk runtime configure --runtime=docker
  changed_when: true
  notify: restart docker

- name: Check if nvidia-smi works
  command: nvidia-smi
  register: nvidia_smi_check
  changed_when: false
  failed_when: false

- name: Enable NVIDIA Persistence Mode
  command: nvidia-smi -pm 1
  changed_when: false
  when: nvidia_smi_check.rc == 0
  ignore_errors: true

- name: Enable and start NVIDIA Persistence Daemon
  systemd:
    name: nvidia-persistenced
    state: started
    enabled: true
  when: nvidia_smi_check.rc == 0
  ignore_errors: true

- name: Create internal AI network
  community.docker.docker_network:
    name: ai_network

- name: Run hardware optimizations
  include_tasks: optimizations.yml

- name: Setup Ollama
  include_tasks: ollama.yml
  tags: ollama

- name: Pull AI models
  include_tasks: models.yml
  tags: ollama, pull_models

- name: Setup WebUI
  include_tasks: webui.yml
  tags: webui

- name: Setup maintenance and cleanup
  include_tasks: maintenance.yml

- name: Install kill_zombies helper script for root
  copy:
    src: "{{ playbook_dir }}/bin/kill_zombies.sh"
    dest: /root/kill_zombies.sh
    owner: root
    group: root
    mode: "0700"

- name: Check if AI TLS certificate already exists
  stat:
    path: /etc/letsencrypt/live/{{ ai_domain }}/fullchain.pem
  register: ai_certbot_cert

- name: Stop nginx before certbot (free port 80 for standalone mode)
  systemd:
    name: nginx
    state: stopped
  ignore_errors: true
  when: not ai_certbot_cert.stat.exists

- name: Obtain AI TLS certificate with certbot (standalone mode)
  command: >
    certbot certonly --standalone
    --non-interactive
    --agree-tos
    --email {{ certbot_email }}
    -d {{ ai_domain }}
    --keep-until-expiring
  when: not ai_certbot_cert.stat.exists
  register: ai_certbot_result
  changed_when: >
    'obtained' in (ai_certbot_result.stdout | lower) or
    'new certificate' in (ai_certbot_result.stdout | lower)

- name: Start nginx after certbot
  systemd:
    name: nginx
    state: started
  when: not ai_certbot_cert.stat.exists

- name: Deploy nginx reverse proxy config for AI domain with TLS
  template:
    src: ai_proxy_conf.j2
    dest: /etc/nginx/sites-available/ai-proxy.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Enable nginx AI proxy site
  file:
    src: /etc/nginx/sites-available/ai-proxy.conf
    dest: /etc/nginx/sites-enabled/ai-proxy.conf
    state: link
  notify: Reload nginx

- name: Test nginx configuration
  command: nginx -t
  changed_when: false
