- name: Create Open WebUI data directory
  file:
    path: "{{ open_webui_data_path }}"
    state: directory
    mode: "0755"

- name: Deploy Open WebUI
  community.docker.docker_container:
    name: open-webui
    image: "ghcr.io/open-webui/open-webui:main"
    state: started
    restart_policy: always
    networks:
      - name: ai_network
    published_ports:
      - "127.0.0.1:{{ agent_ui_port }}:8080"
    env:
      OLLAMA_BASE_URL: "http://ollama:11434"
      ENABLE_API_KEY: "true"
      WEBUI_SECRET_KEY: "{{ webui_secret }}"
    volumes:
      - "{{ open_webui_data_path }}:/app/backend/data"
    comparisons:
      env: strict
    recreate: false

- name: Wait for Agent API to be ready
  wait_for:
    port: "{{ agent_ui_port }}"
    delay: 5
