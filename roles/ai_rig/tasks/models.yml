- name: Pull AI models tasks
  tags:
    - ollama
    - pull_models
  block:
    - name: Check Ollama systemd service is active
      command: systemctl is-active ollama.service
      register: ollama_service_status
      changed_when: false
      failed_when: ollama_service_status.stdout != "active"

    - name: Check Ollama container is running
      command: docker ps --filter "name=ollama" --quiet
      register: ollama_container_status
      changed_when: false
      failed_when: ollama_container_status.stdout | length == 0

    - name: Wait for Ollama API to be ready
      wait_for:
        port: "{{ ollama_port }}"
        delay: 5
        timeout: 60

    - name: Get currently installed models
      command: docker exec ollama ollama list
      register: installed_models
      changed_when: false
      failed_when: false

    - name: Pull AI models (including quantized variants)
      command: "docker exec ollama ollama pull {{ item }}"
      loop: "{{ ai_models }}"
      register: pull_results
      changed_when: true
      when: item not in (installed_models.stdout | default(''))

    - name: Remove AI models scheduled for removal
      command: "docker exec ollama ollama rm {{ item }}"
      loop: "{{ ai_models_remove | default([]) }}"
      register: remove_results
      changed_when: true
      when: item in (installed_models.stdout | default(''))

    - name: Verify all models are installed
      tags:
        - show_models
      command: "docker exec ollama ollama list"
      register: model_verify
      changed_when: false

    - name: Show installed models for UI
      tags:
        - show_models
      debug:
        msg: |
          Installed models:
          {% for line in (model_verify.stdout_lines | default(installed_models.stdout_lines, true)) %}
          {{ line }}
          {% endfor %}
