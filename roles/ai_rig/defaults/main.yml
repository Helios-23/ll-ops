# Models sized to fit 20GB VRAM on RTX 4000 SFF Ada
# Only 1-2 large models can be resident at once
ai_models:
  # Coding & Logic
  - "qwen2.5-coder:32b"  # 32B coder, 32K context
  - "deepseek-coder-v2:16b"  # 16B coding specialist
  - "starcoder2:7b"  # Fast code completion, 16K context
  - "phi4:latest"  # 14B reasoning model

  # General LLM & Writing
  - "llama3.1:8b"  # Meta 8B instruct, 8K context
  - "mistral:7b"  # Fast 7B general purpose
  - "gemma2:9b"  # Google 9B, balanced
  - "qwen2.5:14b"  # 14B multilingual support

  # Reasoning / Chain-of-Thought
  - "deepseek-r1:8b"  # 8B reasoning specialist

  # Multimodal / Vision
  - "llava:7b"  # Vision-language, image understanding
  - "bakllava:7b"  # Mistral 7B + vision

  # Small fast models
  - "phi4-mini:3.8b"  # Tiny Phi-4, 128K context
  - "gemma:2b"  # Ultra-lightweight

  # Coding (small/fast)
  - "starcoder2:3b"  # Tiny coder, 3B params
  - "codegemma:2b"  # Small Google coder

  # Structured Output / Agents
  - "hermes3:8b"  # 8B agentic capabilities

  # Embeddings (for RAG)
  - "nomic-embed-text:latest"  # High-quality embeddings

# Open WebUI settings
open_webui_show_all_models: true  # Show all installed models in UI
open_webui_model_selection: "advanced"  # "simple" or "advanced"

# GEX44 hardware specs
nvidia_driver_version: "535"
cpu_governor: "performance"
cpu_threads: 14
force_reboot: false  # Set to true for driver installs

# VRAM management (20GB GPU)
max_vram_models: 1  # Max models resident in VRAM
vram_keep_alive: "30m"  # Keep in VRAM (30 min inactivity)
parallel_requests: 2  # Max concurrent requests

# Docker storage paths
ollama_data_path: "/opt/ollama"
open_webui_data_path: "/opt/open-webui"

# Port configurations
ollama_port: 11434
agent_ui_port: 3000

# Docker image versions
ollama_image: "ollama/ollama:latest"

# Open WebUI session signing key (override in vault)
webui_secret: "{{ vault.webui.token | default('change-me') }}"

# Open WebUI admin account (override in vault)
webui_admin_user: "{{ vault.webui.admin_user | default('admin@epytype.org') }}"
webui_admin_pass: "{{ vault.webui.admin_pass | default('change-me') }}"

# Ollama GPU settings
ollama_num_gpu: 999  # Enable all GPU layers

# Domain and network settings
ai_domain: "ai.epytype.org"

# Nginx proxy settings
nginx_proxy_buffering: "off"
nginx_read_timeout: 600s

# Certbot settings
certbot_email: "{{ vault.ai_certbot_email | default('helios23@gmail.com') }}"

# Memory protection settings
swap_size_mb: 16384  # Swap size in MB for CPU offload
