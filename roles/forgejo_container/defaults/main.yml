forgejo_root_dir: /opt/forgejo
forgejo_data_dir: /opt/forgejo/data
forgejo_db_dir: /opt/forgejo/postgres
forgejo_http_port: 3000
forgejo_ssh_port: 2222
forgejo_version: "10"
forgejo_postgres_version: "16"
forgejo_postgres_db: forgejo
forgejo_postgres_user: forgejo
forgejo_postgres_password: change-me
forgejo_domain: "repo.epytype.org"
forgejo_https_enabled: false
certbot_email: "helios23@gmail.com"

# MAIL
forgejo_mailer_enabled: false
forgejo_mailer_from: "forgejo@repo.epytype.org"
forgejo_mailer_protocol: "smtps" # or "smtp+starttls" for STARTTLS/587
forgejo_mailer_smtp_addr: ""
forgejo_mailer_smtp_port: 465
forgejo_mailer_user: ""
forgejo_mailer_passwd: ""
forgejo_mailer_enable_notify_mail: true
forgejo_mailer_subject_prefix: "[Forgejo]"
forgejo_mailer_enable_helo: true
forgejo_mailer_helo_hostname: "{{ forgejo_domain }}"
forgejo_mailer_envelope_from: ""

# Forgejo user management (optional)
# forgejo_users:
