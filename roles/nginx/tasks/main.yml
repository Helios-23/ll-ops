- name: Install nginx
  apt:
    name: nginx
    state: present
    update_cache: true

- name: Ensure sites-available directory exists
  file:
    path: /etc/nginx/sites-available
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure sites-enabled directory exists
  file:
    path: /etc/nginx/sites-enabled
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Create certbot webroot directory
  file:
    path: /var/www/certbot
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy default HTTP config for certbot validation
  template:
    src: default-http.j2
    dest: /etc/nginx/sites-available/default-http
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Enable default HTTP site
  file:
    src: /etc/nginx/sites-available/default-http
    dest: /etc/nginx/sites-enabled/default-http
    state: link
  notify: Reload nginx

- name: Ensure nginx is started and enabled
  systemd:
    name: nginx
    state: started
    enabled: true
