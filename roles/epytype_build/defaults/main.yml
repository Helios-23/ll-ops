# Epytype build role. Mirrors the structure of `roles/lantern_build` so that
# `ops/build.yml` can build either product (or both) by selecting tags.
#
# The Epytype build pipeline leverages Docker Compose to build across a variety
# of targets (Linux, WASM, macOS, Windows).
epytype_build_repo_dir: "{{ playbook_dir }}/../epytype"
epytype_build_target: "{{ target | default('all') }}"
epytype_build_compose_dir: "{{ epytype_build_repo_dir }}/cross/docker"
epytype_build_all_targets:
  - x86_64
  - x86_64-musl
  - aarch64
  - riscv64
  - wasm
  - macos
  - windows
epytype_build_selected_targets: >-
  {{
    epytype_build_all_targets
    if epytype_build_target == 'all'
    else [epytype_build_target]
  }}
epytype_build_binary_dir: "{{ epytype_build_repo_dir }}/dist/binaries"
epytype_build_package_dir: "{{ epytype_build_repo_dir }}/dist/packages"
# Verification accepts any of these extensions so the check works for every
# target the Epytype build pipeline produces.
epytype_build_release_artifacts:
  - "*.tar.gz"
  - "*.tgz"
  - "*.zip"
  - "*.whl"
  - "*.deb"
  - "*.rpm"
  - "*.apk"
