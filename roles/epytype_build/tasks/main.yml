- name: Epytype build role
  tags: epytype_build
  block:
    - name: Validate Epytype build target
      fail:
        msg: >-
          Unknown Epytype build target '{{ epytype_build_target }}'.
          Valid: all, or one of {{ epytype_build_all_targets | join(', ') }}.
      when:
        - epytype_build_target != 'all'
        - epytype_build_target not in epytype_build_all_targets

    # Repo Clone
    - name: Create Epytype build output directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ epytype_build_binary_dir }}"
        - "{{ epytype_build_package_dir }}"

    - name: Clone or update Epytype repository
      ansible.builtin.git:
        repo: "git@github.com:jperry303/epytype.git"
        dest: "{{ epytype_build_repo_dir }}"
        version: main
        update: yes
      register: epytype_build_pull
      when: update_repo

    - name: Clean cached zig binaries for platform-agnostic Docker builds
      file:
        path: "{{ epytype_build_repo_dir }}/scripts/tools/zig"
        state: absent

    - name: Capture pre-build checksums
      shell: |
        find {{ epytype_build_package_dir }} -type f \( -name "*.apk" -o -name "*.deb" -o -name "*.zip" -o -name "*.tar.gz" -o -name "*.msix" -o -name "*.rpm" \) -exec shasum -a 256 {} + > {{ epytype_build_binary_dir }}/pre_build_hashes.txt
      register: pre_build_hashes

    # Docker Compose orchestration
    - name: Build ALL Epytype targets in parallel via Docker Compose
      command: docker compose --profile all up
      args:
        chdir: "{{ epytype_build_compose_dir }}"
      register: epytype_build_compose_up
      when: epytype_build_target == 'all'

    - name: Clean up Epytype compose resources
      command: docker compose down --remove-orphans
      args:
        chdir: "{{ epytype_build_compose_dir }}"
      when: epytype_build_target == 'all'

    - name: Build single Epytype target sequentially
      command: docker compose run --rm -T --remove-orphans {{ item }}
      args:
        chdir: "{{ epytype_build_compose_dir }}"
      loop: "{{ epytype_build_selected_targets }}"
      when: epytype_build_target != 'all'

    # Verification
    - name: Find all files in the output directory
      ansible.builtin.find:
        paths: "{{ epytype_build_package_dir }}"
        patterns: "{{ epytype_build_release_artifacts }}"
        file_type: file
      register: found_files

    - name: Identify files with updated checksums
      shell: |
        changed_list=""
        for file in {{ found_files.files | map(attribute='path') | join(' ') }}; do
          current_hash=$(shasum -a 256 "$file" | awk '{print $1}')
          if ! grep -q "$current_hash" {{ epytype_build_binary_dir }}/pre_build_hashes.txt; then
            changed_list="$changed_list $file"
          fi
        done
        echo $changed_list
      register: checksum_verification

    - name: Set changed files fact
      ansible.builtin.set_fact:
        changed_files: "{{ checksum_verification.stdout.split() }}"

    - name: Show the list of changed files
      ansible.builtin.debug:
        msg: |
          Changed files:
          {% for file in changed_files %}
          {{ file }}
          {% endfor %}

    - name: Cleanup checksum snapshots
      ansible.builtin.file:
        path: "{{ epytype_build_binary_dir }}/pre_build_hashes.txt"
        state: absent
