[defaults]
ansible_managed = Ansible managed: {file} modified by {uid} on {host}
host_key_checking = False
allow_world_readable_tmpfiles = True
interpreter_python = auto_silent
local_tmp = /tmp/ansible-local
remote_tmp = /var/tmp/ansible-remote
forks = 30
deprecation_warnings = False
force_color = True
#remote user servers
remote_user = devops
vault_password_file = .vault_devops
show_per_host_start = True

#Callback settings
# Only use default stdout - shows TASK [name] before execution
stdout_callback = default
callback_result_format = yaml
callback_format_pretty = True
display_skipped_hosts = False

#Fact Caching
gathering = smart
#gathering = explicit
fact_caching_connection = /tmp/facts_cache
fact_caching = jsonfile
fact_caching_timeout = 7200

internal_poll_interval = 0.001
timeout = 30

#Inventory
inventory = ./inventory/epytype

#logging
no_target_syslog=False
log_path=./ansible.log
#syslog_facility=

# Enable Persistent connections
use_persistent_connections=True

[ssh_connection]
scp_if_ssh = True
pipelining = True
ssh_args =-C -o ControlMaster=auto -o ControlPersist=1200 -o ForwardAgent=yes -o PreferredAuthentications=publickey -o Ciphers=aes256-ctr,aes256-gcm@openssh.com,aes192-ctr,aes128-ctr,aes128-gcm@openssh.com -o MACs=hmac-sha2-256,hmac-sha2-512,hmac-sha1 -o KexAlgorithms=diffie-hellman-group16-sha512,diffie-hellman-group18-sha512,diffie-hellman-group14-sha256,ecdh-sha2-nistp256,ecdh-sha2-nistp384 -o PubkeyAcceptedAlgorithms=ssh-ed25519,rsa-sha2-256,rsa-sha2-512,ecdsa-sha2-nistp256 -o HostKeyAlgorithms=ssh-ed25519,rsa-sha2-256,rsa-sha2-512,ecdsa-sha2-nistp256

[inventory]
enable_plugins = ini, yaml, script, auto
#disabled_plugins = host_list aws_ec2

[privilege_escalation]
become = True

[paramiko_connection]
