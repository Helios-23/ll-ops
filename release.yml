- name: Build Lantern native binaries and packages via Docker Compose
  hosts: localhost
  connection: local
  become: false
  gather_facts: false
  tags:
    - lantern_release
  vars:
    lantern_update_repo: false
    lantern_release_target: "{{ target | default('all') }}"
    lantern_release_repo_dir: "{{ playbook_dir }}/../lantern"
    lantern_release_epytype_repo_dir: "{{ playbook_dir }}/../epytype"
    lantern_release_compose_dir: "{{ lantern_release_repo_dir }}/cross/docker"
    lantern_release_all_targets:
      - linux-x86_64-gnu
      - linux-x86_64-musl
      - linux-aarch64-gnu
      - linux-riscv64-gnu
      - macos-universal
      - windows-x86_64-msvc
      - windows-arm64-msvc
    lantern_release_selected_targets: >-
      {{
        lantern_release_all_targets
        if lantern_release_target == 'all'
        else [lantern_release_target]
      }}
    lantern_release_binary_dir: "{{ lantern_release_repo_dir }}/dist/binaries"
    lantern_release_package_dir: "{{ lantern_release_repo_dir }}/dist/packages"
    lantern_release_deb_target_id: linux-x86_64-gnu
    lantern_release_deb_binary: "{{ lantern_release_binary_dir }}/lantern-{{ lantern_release_deb_target_id }}"
    lantern_release_epytype_binary_dir: "{{ lantern_release_epytype_repo_dir }}/dist/binaries"
    lantern_release_build_deb: "{{ lantern_release_target == 'all' or lantern_release_target == 'linux-x86_64-gnu' }}"
  tasks:
    - name: Validate target
      fail:
        msg: "Unknown target '{{ lantern_release_target }}'. Valid: all, or one of {{ lantern_release_all_targets | join(', ') }}"
      when:
        - lantern_release_target != 'all'
        - lantern_release_target not in lantern_release_all_targets

    #- name: Check Lantern repository exists
    #  stat:
    #    path: "{{ lantern_release_repo_dir }}/.git"
    #  register: lantern_git

    #- name: Fail when Lantern repository is missing
    #  fail:
    #    msg: "Lantern git repository not found at {{ lantern_release_repo_dir }}"
    #  when: not lantern_git.stat.exists

    #- name: Check Epytype repository exists
    #  stat:
    #    path: "{{ lantern_release_epytype_repo_dir }}/.git"
    #  register: epytype_git

    #- name: Fail when Epytype repository is missing
    #  fail:
    #    msg: "Epytype git repository not found at {{ lantern_release_epytype_repo_dir }}"
    #  when: not epytype_git.stat.exists

    - name: Clone or update Epytype repository
      ansible.builtin.git:
        repo: "git@github.com:jperry303/epytype.git"
        dest: "{{ lantern_release_epytype_repo_dir }}"
        version: "main"
        update: yes
      register: epytype_pull
      changed_when: "'Already up to date.' not in (epytype_pull.stdout | default(''))"
      when: lantern_update_repo

    - name: Clone or update Lantern repository
      ansible.builtin.git:
        repo: "git@github.com:jperry303/lantern.git"
        dest: "{{ lantern_release_repo_dir }}"
        version: "main"
        update: yes
      register: lantern_pull
      changed_when: "'Already up to date.' not in (lantern_pull.stdout | default(''))"
      when: lantern_update_repo

    #- name: Update Lantern repository
    #  command: git pull --ff-only
    #  args:
    #    chdir: "{{ lantern_release_repo_dir }}"
    #  register: lantern_pull
    #  changed_when: "'Already up to date.' not in (lantern_pull.stdout | default(''))"

    #- name: Update Epytype repository
    #  command: git pull --ff-only
    #  args:
    #    chdir: "{{ lantern_release_epytype_repo_dir }}"
    #  register: epytype_pull
    #  changed_when: "'Already up to date.' not in (epytype_pull.stdout | default(''))"

    - name: Create output directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ lantern_release_binary_dir }}"
        - "{{ lantern_release_package_dir }}"

    - name: Clean cached zig binaries for platform-agnostic Docker builds
      file:
        path: "{{ lantern_release_repo_dir }}/scripts/tools/zig"
        state: absent

    - name: Build all targets in parallel via Docker Compose
      command: docker compose up
      args:
        chdir: "{{ lantern_release_compose_dir }}"
      register: compose_up
      when: lantern_release_target == 'all'

    - name: Check all containers succeeded
      command: >
        sh -c '
        docker compose ps --all --format "{{.Service}} {{.ExitCode}}" |
        while read svc code; do
          if [ "$code" != "0" ]; then
            echo "FAILED: $svc exited with code $code"
            exit 1
          fi
        done
        echo "all targets passed"
        '
      args:
        chdir: "{{ lantern_release_compose_dir }}"
      when: lantern_release_target == 'all'

    - name: Clean up compose resources
      command: docker compose down --remove-orphans
      args:
        chdir: "{{ lantern_release_compose_dir }}"
      when: lantern_release_target == 'all'

    - name: Build single target sequentially
      command: docker compose run --rm -T {{ item }}
      args:
        chdir: "{{ lantern_release_compose_dir }}"
      loop: "{{ lantern_release_selected_targets }}"
      when: lantern_release_target != 'all'

    - name: Verify Debian package was produced by Docker pipeline
      find:
        paths: "{{ lantern_release_package_dir }}"
        patterns: "lantern_*.deb"
        file_type: file
      register: deb_find

    - name: Fail when no Debian package was produced
      fail:
        msg: "No lantern_*.deb found in {{ lantern_release_package_dir }}"
      when: deb_find.matched == 0
