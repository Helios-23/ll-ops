- name: Deploy Lantern runtime package
  hosts: web0
  become: true
  gather_facts: false
  tags:
    - lantern_runtime
  roles:
    - role: lantern_deploy
      tags: lantern_runtime

- name: Deploy Lantern app bundle
  hosts: web0
  become: true
  gather_facts: false
  tags:
    - lantern_app
  vars:
    app_id: ucal
    clean_app: false
    # Update repositories on the controller before building when true
    update_repo: false
  roles:
    - role: lantern_app_deploy
      tags:
        - lantern_app
